name: Dependabot Auto-Merge

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    timeout-minutes: 10
    concurrency:
      group: dependabot-auto-merge-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    steps:
      - name: Fetch Dependabot metadata
        id: dependabot-metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: '${{ secrets.GITHUB_TOKEN }}'

      - name: Apply Dependabot PR labels
        uses: actions/github-script@v7
        env:
          UPDATE_TYPE: ${{ steps.dependabot-metadata.outputs.update-type }}
        with:
          script: |
            const labelsToTry = ['dependencies', 'javascript'];
            const updateType = process.env.UPDATE_TYPE || '';

            if (updateType === 'version-update:semver-patch') {
              labelsToTry.push('semver:patch');
            } else if (updateType === 'version-update:semver-minor') {
              labelsToTry.push('semver:minor');
            } else if (updateType === 'version-update:semver-major') {
              labelsToTry.push('semver:major');
            }

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;

            const repoLabels = await github.paginate(
              github.rest.issues.listLabelsForRepo,
              { owner, repo, per_page: 100 },
              response => response.data.map(label => label.name)
            );

            const existing = new Set(repoLabels);
            const addable = labelsToTry.filter(label => existing.has(label));

            if (addable.length === 0) {
              core.info('No matching labels exist in the repository, skipping label update.');
              return;
            }

            await github.rest.issues.addLabels({ owner, repo, issue_number, labels: addable });
            core.info(`Applied labels: ${addable.join(', ')}`);

      - name: Auto-merge for Dependabot patches
        if: steps.dependabot-metadata.outputs.update-type == 'version-update:semver-patch'
        run: gh pr merge --auto --merge "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
